<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEANJO | Editor PDI</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="img/icon.png">

    <meta name="theme-color" content="#0F172A">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZEANJO">
    <link rel="apple-touch-icon" href="img/icon.png">
</head>
<body>
    <div id="splash-screen">
        <img src="img/logo-app.jpg" alt="ZEANJO" class="splash-logo">
        <h1 class="splash-title">ZEANJO<span class="splash-accent">PDI</span></h1>
        <div class="splash-loader"></div>
    </div>
    <div class="fondo-tecnologico">
        <header class="top-bar">
            <img src="img/logo-uct.png" alt="Logo UCT" class="logo-uct">
            <span class="uni-name">Universidad Católica de Trujillo</span>
        </header>

        <main class="content-center">
            <div class="logo-frame viewfinder">
                <span class="vf-tr"></span><span class="vf-bl"></span>
                <img src="img/logo-app.jpg" alt="Logotipo Zeanjo" class="logo-main">
            </div>

            <h1 class="app-title">ZEANJO<span class="accent">PDI</span></h1>
            <p class="app-subtitle">Procesamiento digital de imágenes</p>

            <div class="action-stack">
                <button onclick="toggleMenuCarga()" class="btn btn-primary">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    Cargar Imagen
                </button>

                <div id="menuCarga" style="display:none;">
                    <button onclick="iniciarCamaraInicio()" class="card card-navy">
                        <span class="ic"><svg class="icon" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2Z"/><circle cx="12" cy="13" r="4"/></svg></span>
                        Abrir Cámara
                    </button>
                    <button onclick="document.getElementById('inputArchivo').click()" class="card card-blue">
                        <span class="ic"><svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg></span>
                        Subir Archivo
                    </button>
                    <button onclick="procesarURL()" class="card card-gold">
                        <span class="ic"><svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>
                        Desde URL
                    </button>
                </div>
            </div>

            <input type="file" id="inputArchivo" accept="image/*" style="display: none;" onchange="cargarImagen(event)">
        </main>

        <footer class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='quienes.html'">
                <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Quiénes Somos
            </div>
            <div class="nav-item" onclick="window.location.href='creditos.html'">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.5 13.5 17 22l-5-3-5 3 1.5-8.5"/></svg>
                Créditos
            </div>
        </footer>
    </div>
    
    <script>
    window.addEventListener("load", () => {
        const splash = document.getElementById("splash-screen");
        setTimeout(() => {
            splash.classList.add("splash-hidden");
            setTimeout(() => splash.remove(), 500);
        }, 800);
    });
    </script>

    <script src="js/main.js"></script>
    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("./sw.js")
                .then(() => console.log("Service Worker registrado"))
                .catch(error => console.log("Error:", error));
        });
    }
    </script>
</body>
</html>
